<body>

<header>
    <h1>Contact Me</h1>

        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <section>
        <h2>Get In Touch</h2>

        <p><strong>Name:</strong> James Kimani</p>
        <p><strong>Phone:</strong> 0723251843</p>
        <p><strong>Email:</strong> kmanijames4@gmail.com</p>

        <h3>Send Me a Message</h3>

        <form action="#" method="post">

            <label for="name">Full Name:</label><br>
            <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter your full name"
                required
                minlength="3"><br><br>

            <label for="email">Email Address:</label><br>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                required><br><br>

            <label for="phone">Phone Number:</label><br>
            <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="0712345678"
                pattern="[0-9]{10}"
                required><br><br>

            <label for="message">Message:</label><br>
            <textarea
                id="message"
                name="message"
                rows="5"
                cols="40"
                placeholder="Write your message here..."
                required
                minlength="10"></textarea><br><br>

            <button type="submit">Send Message</button>

        </form>
    </section>
</main>
